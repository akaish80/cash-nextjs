name: Deploy to Vercel

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: vercel-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy-preview:
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == false
    runs-on: ubuntu-latest
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Validate Vercel secrets
        run: |
          if [ -z "$VERCEL_TOKEN" ] || [ -z "$VERCEL_ORG_ID" ] || [ -z "$VERCEL_PROJECT_ID" ]; then
            echo "Missing Vercel secrets. Please set VERCEL_TOKEN, VERCEL_ORG_ID, and VERCEL_PROJECT_ID in repository or organization secrets."
            exit 1
          fi

      - name: Pull Vercel environment information
        run: npx vercel pull --yes --environment=preview --token="$VERCEL_TOKEN"

      - name: Build project artifacts
        run: npx vercel build --token="$VERCEL_TOKEN"

      - name: Deploy preview to Vercel
        run: npx vercel deploy --prebuilt --token="$VERCEL_TOKEN"

  deploy-production:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Validate Vercel secrets
        run: |
          if [ -z "$VERCEL_TOKEN" ] || [ -z "$VERCEL_ORG_ID" ] || [ -z "$VERCEL_PROJECT_ID" ]; then
            echo "Missing Vercel secrets. Please set VERCEL_TOKEN, VERCEL_ORG_ID, and VERCEL_PROJECT_ID in repository or organization secrets."
            exit 1
          fi

      - name: Pull Vercel environment information
        run: npx vercel pull --yes --environment=production --token="$VERCEL_TOKEN"

      - name: Build project artifacts
        run: npx vercel build --prod --token="$VERCEL_TOKEN"

      - name: Deploy production to Vercel
        run: npx vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"
